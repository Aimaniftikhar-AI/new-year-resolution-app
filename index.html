<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Year Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    min-height:100vh;
    background: linear-gradient(135deg,#020617,#0f172a,#020617);
    color:white;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow:hidden;
}

/* BACKGROUND BUBBLES */
.container{
    position:absolute;
    width:100%;
    height:100%;
    overflow:hidden;
    z-index:-1;
}

.bubbles span{
    position:absolute;
    bottom:-60px;
    width:25px;
    height:25px;
    border-radius:50%;
    animation:rise linear infinite, glow 3s ease-in-out infinite alternate;
    opacity:0.8;
}

/* COLORFUL BUBBLES */
.bubbles span:nth-child(1){ left:10%; background:#ff4d6d; box-shadow:0 0 20px #ff4d6d; animation-duration:8s;}
.bubbles span:nth-child(2){ left:20%; background:#4cc9f0; box-shadow:0 0 20px #4cc9f0; animation-duration:12s;}
.bubbles span:nth-child(3){ left:30%; background:#f72585; box-shadow:0 0 20px #f72585; animation-duration:10s;}
.bubbles span:nth-child(4){ left:40%; background:#b5179e; box-shadow:0 0 20px #b5179e; animation-duration:14s;}
.bubbles span:nth-child(5){ left:50%; background:#7209b7; box-shadow:0 0 20px #7209b7; animation-duration:9s;}
.bubbles span:nth-child(6){ left:60%; background:#3a0ca3; box-shadow:0 0 20px #3a0ca3; animation-duration:11s;}
.bubbles span:nth-child(7){ left:70%; background:#4361ee; box-shadow:0 0 20px #4361ee; animation-duration:7s;}
.bubbles span:nth-child(8){ left:80%; background:#06d6a0; box-shadow:0 0 20px #06d6a0; animation-duration:13s;}
.bubbles span:nth-child(9){ left:90%; background:#ffd60a; box-shadow:0 0 20px #ffd60a; animation-duration:15s;}
.bubbles span:nth-child(10){ left:95%; background:#ff9f1c; box-shadow:0 0 20px #ff9f1c; animation-duration:10s;}

/* ANIMATION */
@keyframes rise{
    0%{
        transform:translateY(0) scale(0.5);
    }
    100%{
        transform:translateY(-110vh) scale(1.2);
    }
}

@keyframes glow{
    from{ filter: brightness(1);}
    to{ filter: brightness(2);}
}

/* HEADER */
.header{
    text-align:center;
    margin-top:60px;
}

.header h1{
    font-size:3rem;
    color:#ff5945;
}

.header h2{
    font-size:4rem;
    margin-top:10px;
    color:#38bdf8;
}

/* TODO CARD */
.todo-app{
    margin-top:40px;
    width:400px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding:30px;
    border-radius:20px;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);
}

.todo-app h3{
    text-align:center;
    margin-bottom:20px;
}

/* INPUT ROW */
.row{
    display:flex;
    gap:10px;
}

#input{
    flex:1;
    padding:12px;
    border:none;
    border-radius:10px;
    outline:none;
}

button{
    padding:12px 20px;
    border:none;
    background:#ff5945;
    color:white;
    border-radius:10px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff2d57;
}

/* LIST */
ul{
    margin-top:20px;
}

ul li{
    list-style:none;
    background:rgba(255,255,255,0.08);
    padding:10px;
    border-radius:8px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.checked{
    text-decoration:line-through;
    opacity:0.6;
}

li span{
    color:red;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- BUBBLES -->
<div class="container">
    <div class="bubbles">
        <span></span><span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span><span></span>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Happy New Year 🎉</h1>
    <h2>2026</h2>
</div>

<!-- TODO APP -->
<div class="todo-app">
    <h3>New Year Resolutions</h3>

    <div class="row">
        <input type="text" id="input" placeholder="Enter your goal...">
        <button onclick="addTask()">Add</button>
    </div>

    <ul id="list-container"></ul>
</div>

<script>
let input = document.getElementById("input");
let list = document.getElementById("list-container");

function addTask(){
    if(input.value === ''){
        alert("Please enter something");
    } else {
        let li = document.createElement("li");
        li.innerHTML = input.value;

        let span = document.createElement("span");
        span.innerHTML = "✖";

        li.appendChild(span);
        list.appendChild(li);
    }
    input.value="";
    saveData();
}

list.addEventListener("click", function(e){
    if(e.target.tagName === "LI"){
        e.target.classList.toggle("checked");
    }
    else if(e.target.tagName === "SPAN"){
        e.target.parentElement.remove();
    }
    saveData();
});

function saveData(){
    localStorage.setItem("data", list.innerHTML);
}

function showTask(){
    list.innerHTML = localStorage.getItem("data");
}

showTask();
</script>

</body>
</html>
